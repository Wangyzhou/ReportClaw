# T5 Report Agent — Registry
# Clawith / OpenClaw 部署时读取此文件加载 5 个 Agent
# 业务规则在各 Agent 的 soul.md 中（markdown 写人格，YAML 写部署元数据）

version: "0.1"
team_name: "T5 Report Writing Team"
created_at: "2026-04-17"

agents:
  - name: coordinator
    role: 报告协调员
    soul: agents/coordinator/soul.md
    skills_dir: agents/coordinator/skills/
    model: claude-sonnet-4-6
    temperature: 0.3
    is_orchestrator: true
    can_delegate_to: [retriever, writer, rewriter, reviewer]

  - name: retriever
    role: 知识库检索员
    soul: agents/retriever/soul.md
    skills_dir: agents/retriever/skills/
    model: claude-haiku-4-5
    temperature: 0.0
    tools:
      - ragflow_hybrid_search
      - ragflow_get_chunk
    can_delegate_to: []

  - name: writer
    role: 报告写作员
    soul: agents/writer/soul.md
    skills_dir: agents/writer/skills/
    model: claude-sonnet-4-6
    temperature: 0.6
    can_delegate_to: []

  - name: rewriter
    role: 报告改写员
    soul: agents/rewriter/soul.md
    skills_dir: agents/rewriter/skills/
    model: claude-sonnet-4-6
    temperature: 0.4
    can_delegate_to: []

  - name: reviewer
    role: 报告审查员
    soul: agents/reviewer/soul.md
    skills_dir: agents/reviewer/skills/
    model: claude-sonnet-4-6
    temperature: 0.2
    can_delegate_to: [retriever]   # 反查 KB 验证 chunk_id

# Agent 间通信契约
protocol:
  envelope_schema: docs/a2a-message-schema.md
  max_review_rounds: 2
  default_timeout_seconds: 60

# 知识库后端（王亚洲负责搭建）
knowledge_base:
  backend: ragflow
  embedding_model: bge-m3
  reranker: bge-reranker-v2
  endpoint: "http://localhost:9380"   # 占位，王亚洲填实际地址
